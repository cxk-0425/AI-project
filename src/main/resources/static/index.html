<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🧠 企业知识库问答系统</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --primary: #4f46e5; --primary-light: #818cf8;
    --bg: #0f172a; --surface: #1e293b; --surface-2: #334155;
    --border: #475569; --text: #f1f5f9; --muted: #94a3b8;
    --green: #22c55e; --red: #f87171; --yellow: #fbbf24;
  }
  body { font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }

  /* ── Header ── */
  header { background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 14px 24px; display: flex; align-items: center; gap: 14px; }
  .logo { font-size: 1.6rem; }
  header h1 { font-size: 1.2rem; font-weight: 700; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green);
    animation: pulse 2s infinite; margin-left: auto; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* ── Layout ── */
  .layout { display: flex; flex: 1; overflow: hidden; }

  /* ── Sidebar ── */
  .sidebar { width: 300px; background: var(--surface); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; }
  .sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); font-size: .85rem;
    font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing:.06em; }

  /* 上传区 */
  .upload-area { margin: 16px; border: 2px dashed var(--border); border-radius: 12px;
    padding: 20px; text-align: center; cursor: pointer; transition: all .2s;
    color: var(--muted); }
  .upload-area:hover, .upload-area.drag-over { border-color: var(--primary); color: var(--primary-light); }
  .upload-area .upload-icon { font-size: 2rem; margin-bottom: 8px; display: block; }
  .upload-area p { font-size: .82rem; }
  #fileInput { display: none; }
  .upload-btn { display: block; margin: 8px auto 0; padding: 7px 18px; background: var(--primary);
    color: #fff; border: none; border-radius: 8px; font-size: .85rem; cursor: pointer;
    transition: opacity .15s; }
  .upload-btn:hover { opacity: .85; }

  /* 文档列表 */
  .doc-list { flex: 1; overflow-y: auto; padding: 0 16px 16px; }
  .doc-item { background: var(--surface-2); border-radius: 10px; padding: 12px;
    margin-bottom: 8px; border: 1px solid var(--border); }
  .doc-item .doc-name { font-size: .85rem; font-weight: 600; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
  .doc-item .doc-meta { display: flex; gap: 8px; align-items: center; font-size: .72rem; color: var(--muted); }
  .badge { padding: 2px 7px; border-radius: 9999px; font-size: .68rem; font-weight: 600; }
  .badge-done { background: #14532d; color: #86efac; }
  .badge-processing { background: #1e3a5f; color: #93c5fd; }
  .badge-error { background: #7f1d1d; color: #fca5a5; }
  .doc-delete { margin-left: auto; background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: .9rem; padding: 2px 6px; border-radius: 4px;
    transition: all .15s; }
  .doc-delete:hover { background: #7f1d1d; color: #fca5a5; }
  .empty-docs { text-align: center; color: var(--muted); padding: 24px; font-size: .82rem; }

  /* ── Chat区域 ── */
  .chat-area { flex: 1; display: flex; flex-direction: column; }
  .messages { flex: 1; overflow-y: auto; padding: 24px; display: flex;
    flex-direction: column; gap: 20px; }

  .msg { display: flex; gap: 12px; max-width: 85%; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.assistant { align-self: flex-start; }

  .avatar { width: 34px; height: 34px; border-radius: 50%; display: flex;
    align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; }
  .msg.user .avatar { background: var(--primary); }
  .msg.assistant .avatar { background: var(--surface-2); border: 1px solid var(--border); }

  .bubble { background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    padding: 12px 16px; font-size: .9rem; line-height: 1.65; }
  .msg.user .bubble { background: var(--primary); border-color: transparent; color: #fff; }
  .msg.assistant .bubble { position: relative; }

  .sources-tag { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 10px;
    padding-top: 8px; border-top: 1px solid var(--border); }
  .source-chip { background: var(--surface-2); color: var(--muted); font-size: .7rem;
    padding: 2px 8px; border-radius: 9999px; border: 1px solid var(--border); }

  .typing-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: var(--muted); animation: typing 1.4s infinite ease-in-out; }
  .typing-dot:nth-child(2) { animation-delay: .2s; }
  .typing-dot:nth-child(3) { animation-delay: .4s; }
  @keyframes typing { 0%,80%,100%{transform:scale(.8);opacity:.4} 40%{transform:scale(1);opacity:1} }

  /* ── 输入框 ── */
  .input-area { padding: 16px 24px; border-top: 1px solid var(--border);
    background: var(--surface); }
  .input-row { display: flex; gap: 10px; align-items: flex-end; }
  textarea#question { flex: 1; resize: none; background: var(--surface-2); border: 1px solid var(--border);
    border-radius: 12px; color: var(--text); font-family: inherit; font-size: .9rem;
    padding: 12px 14px; max-height: 120px; outline: none; transition: border-color .2s;
    scrollbar-width: thin; }
  textarea#question:focus { border-color: var(--primary); }
  .send-btn { width: 44px; height: 44px; background: var(--primary); border: none;
    border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all .15s; color: #fff; }
  .send-btn:hover:not(:disabled) { opacity: .85; transform: scale(1.05); }
  .send-btn:disabled { opacity: .4; cursor: not-allowed; }
  .hint-text { font-size: .72rem; color: var(--muted); margin-top: 6px; }

  /* ── Toast ── */
  .toast-wrap { position: fixed; bottom: 24px; right: 24px; display: flex;
    flex-direction: column; gap: 8px; z-index: 999; }
  .toast { background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 16px; font-size: .85rem; min-width: 200px; max-width: 320px;
    animation: slideIn .25s ease; }
  .toast.success { border-left: 3px solid var(--green); }
  .toast.error   { border-left: 3px solid var(--red); }
  .toast.info    { border-left: 3px solid var(--primary-light); }
  @keyframes slideIn { from{transform:translateX(30px);opacity:0} to{transform:translateX(0);opacity:1} }

  /* ── Upload Progress ── */
  .progress-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; margin-top: 8px; }
  .progress-fill { height: 100%; background: var(--primary); width: 0; transition: width .3s; }

  /* Welcome */
  .welcome { text-align: center; padding: 60px 24px; color: var(--muted); }
  .welcome h2 { font-size: 1.5rem; color: var(--text); margin-bottom: 12px; }
  .welcome p { font-size: .9rem; margin-bottom: 24px; }
  .suggestion-chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
  .chip { background: var(--surface-2); border: 1px solid var(--border); border-radius: 9999px;
    padding: 7px 14px; font-size: .82rem; cursor: pointer; transition: all .15s; }
  .chip:hover { border-color: var(--primary); color: var(--primary-light); }

  ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>
<header>
  <span class="logo">🧠</span>
  <h1>企业知识库问答系统</h1>
  <small style="color:var(--muted);font-size:.78rem">Spring AI + PGVector · RAG</small>
  <div class="status-dot" title="服务运行中"></div>
</header>

<div class="layout">
  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="sidebar-header">📂 知识库文档</div>

    <!-- 拖拽上传区 -->
    <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
      <span class="upload-icon">📄</span>
      <p>拖拽或点击上传</p>
      <p style="font-size:.72rem;margin-top:4px;color:var(--muted)">支持 PDF · DOCX · TXT · MD</p>
      <button class="upload-btn" onclick="event.stopPropagation()">选择文件</button>
      <div class="progress-bar" id="progressBar" style="display:none">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>
    <input type="file" id="fileInput" accept=".pdf,.docx,.doc,.txt,.md"
           onchange="uploadFile(this.files[0])" />

    <!-- 文档列表 -->
    <div class="doc-list" id="docList">
      <div class="empty-docs">📭 暂无文档<br>请上传文件到知识库</div>
    </div>
  </aside>

  <!-- ── Chat 区域 ── -->
  <div class="chat-area">
    <div class="messages" id="messages">
      <!-- 欢迎页 -->
      <div class="welcome" id="welcome">
        <h2>👋 你好，有什么可以帮你？</h2>
        <p>请先上传文档，然后向知识库提问</p>
        <div class="suggestion-chips">
          <div class="chip" onclick="askSuggestion(this)">这份文档的主要内容是什么？</div>
          <div class="chip" onclick="askSuggestion(this)">请总结知识库中的关键信息</div>
          <div class="chip" onclick="askSuggestion(this)">有哪些注意事项？</div>
          <div class="chip" onclick="askSuggestion(this)">产品的核心功能是什么？</div>
        </div>
      </div>
    </div>

    <!-- 输入区 -->
    <div class="input-area">
      <div class="input-row">
        <textarea id="question" rows="1" placeholder="输入问题，按 Enter 发送，Shift+Enter 换行..."
          onkeydown="handleKeyDown(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendQuestion()" title="发送">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
      <p class="hint-text">🔑 需在 application.yml 配置 OpenAI API Key · 模型: gpt-4o-mini + text-embedding-3-small</p>
    </div>
  </div>
</div>

<!-- Toast 容器 -->
<div class="toast-wrap" id="toastWrap"></div>

<script>
const API = '';  // 同域，无需前缀
let isStreaming = false;

// ── 文档上传 ──────────────────────────────────────────────────────────────
const uploadArea = document.getElementById('uploadArea');
uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('drag-over'); });
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('drag-over'));
uploadArea.addEventListener('drop', e => {
  e.preventDefault();
  uploadArea.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) uploadFile(file);
});

async function uploadFile(file) {
  if (!file) return;
  const ext = file.name.split('.').pop().toLowerCase();
  if (!['pdf','docx','doc','txt','md'].includes(ext)) {
    showToast('不支持的文件类型：' + ext, 'error');
    return;
  }
  showToast('正在上传：' + file.name, 'info');
  document.getElementById('progressBar').style.display = 'block';
  animateProgress();

  const form = new FormData();
  form.append('file', file);
  try {
    const res = await fetch(`${API}/api/documents/upload`, { method: 'POST', body: form });
    const data = await res.json();
    if (data.success) {
      showToast(`✅ ${file.name} 入库成功，${data.document.chunkCount} 个片段`, 'success');
      loadDocuments();
    } else {
      showToast('上传失败：' + data.message, 'error');
    }
  } catch (e) {
    showToast('网络错误：' + e.message, 'error');
  } finally {
    document.getElementById('progressBar').style.display = 'none';
    document.getElementById('progressFill').style.width = '0';
    document.getElementById('fileInput').value = '';
  }
}

function animateProgress() {
  let w = 0;
  const fill = document.getElementById('progressFill');
  const id = setInterval(() => {
    w = Math.min(w + Math.random() * 15, 90);
    fill.style.width = w + '%';
    if (w >= 90) clearInterval(id);
  }, 200);
}

// ── 文档列表 ──────────────────────────────────────────────────────────────
async function loadDocuments() {
  try {
    const res = await fetch(`${API}/api/documents`);
    const docs = await res.json();
    renderDocList(docs);
  } catch (e) {
    console.warn('[UI] 获取文档列表失败', e);
  }
}

function renderDocList(docs) {
  const el = document.getElementById('docList');
  if (!docs || docs.length === 0) {
    el.innerHTML = '<div class="empty-docs">📭 暂无文档<br>请上传文件到知识库</div>';
    return;
  }
  const statusLabel = s => ({
    DONE: '<span class="badge badge-done">已完成</span>',
    PROCESSING: '<span class="badge badge-processing">处理中</span>',
    ERROR: '<span class="badge badge-error">失败</span>',
    PENDING: '<span class="badge">等待中</span>',
  }[s] || s);

  el.innerHTML = docs.map(doc => `
    <div class="doc-item" data-id="${doc.id}">
      <div class="doc-name" title="${doc.filename}">${doc.filename}</div>
      <div class="doc-meta">
        ${statusLabel(doc.status)}
        <span>${doc.chunkCount || 0} 片段</span>
        <span>${fmtSize(doc.fileSize)}</span>
        <button class="doc-delete" onclick="deleteDoc('${doc.id}','${doc.filename}')" title="删除">🗑</button>
      </div>
    </div>`).join('');
}

async function deleteDoc(id, name) {
  if (!confirm(`删除文档"${name}"？此操作不可恢复。`)) return;
  try {
    const res = await fetch(`${API}/api/documents/${id}`, { method: 'DELETE' });
    const data = await res.json();
    if (data.success) { showToast('已删除：' + name, 'success'); loadDocuments(); }
    else showToast('删除失败：' + data.message, 'error');
  } catch (e) { showToast('网络错误', 'error'); }
}

// ── 问答 ──────────────────────────────────────────────────────────────────
function handleKeyDown(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendQuestion(); }
}

function autoResize(ta) {
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
}

async function sendQuestion() {
  if (isStreaming) return;
  const q = document.getElementById('question').value.trim();
  if (!q) return;

  // 隐藏欢迎页
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  appendMsg('user', q);
  document.getElementById('question').value = '';
  document.getElementById('question').style.height = 'auto';

  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  isStreaming = true;

  // 创建 assistant bubble（流式填充）
  const assistantId = 'msg-' + Date.now();
  appendMsg('assistant', '', assistantId);
  const bubble = document.querySelector(`#${assistantId} .bubble`);
  const typing = document.createElement('span');
  typing.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';
  bubble.appendChild(typing);

  let fullText = '';
  let sources = [];

  try {
    const sse = new EventSource(`${API}/api/chat/stream?q=${encodeURIComponent(q)}`);

    sse.addEventListener('token', e => {
      if (typing.parentNode) typing.remove();
      fullText += e.data;
      bubble.innerHTML = markdownToHtml(fullText);
      scrollToBottom();
    });

    sse.addEventListener('sources', e => {
      sources = e.data.split(', ').filter(Boolean);
    });

    sse.addEventListener('done', () => {
      sse.close();
      isStreaming = false;
      btn.disabled = false;
      // 渲染最终内容（含来源标签）
      renderFinalMsg(bubble, fullText, sources);
      scrollToBottom();
    });

    sse.addEventListener('error', e => {
      sse.close();
      isStreaming = false;
      btn.disabled = false;
      if (typing.parentNode) typing.remove();
      bubble.innerHTML = `<span style="color:var(--red)">⚠ ${e.data || 'AI 服务暂时不可用，请稍后重试'}</span>`;
    });

    sse.onerror = () => {
      sse.close();
      isStreaming = false;
      btn.disabled = false;
      if (typing.parentNode) typing.remove();
      if (!fullText) {
        bubble.innerHTML = '<span style="color:var(--red)">⚠ 连接失败，请检查服务是否正常运行</span>';
      }
    };

  } catch (err) {
    isStreaming = false;
    btn.disabled = false;
    bubble.innerHTML = `<span style="color:var(--red)">⚠ ${err.message}</span>`;
  }
}

function renderFinalMsg(bubble, text, sources) {
  let html = markdownToHtml(text);
  if (sources.length > 0) {
    html += '<div class="sources-tag">' +
      sources.map(s => `<span class="source-chip">📄 ${escHtml(s)}</span>`).join('') +
      '</div>';
  }
  bubble.innerHTML = html;
}

function appendMsg(role, text, id) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  if (id) div.id = id;
  div.innerHTML = `
    <div class="avatar">${role === 'user' ? '👤' : '🤖'}</div>
    <div class="bubble">${markdownToHtml(text)}</div>`;
  msgs.appendChild(div);
  scrollToBottom();
}

function askSuggestion(el) {
  document.getElementById('question').value = el.textContent;
  sendQuestion();
}

// ── 工具函数 ──────────────────────────────────────────────────────────────
function scrollToBottom() {
  const msgs = document.getElementById('messages');
  msgs.scrollTop = msgs.scrollHeight;
}

function fmtSize(b) {
  if (!b) return '0B';
  if (b > 1048576) return (b/1048576).toFixed(1) + 'MB';
  if (b > 1024)    return (b/1024).toFixed(1) + 'KB';
  return b + 'B';
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/** 简单 Markdown 渲染（粗体、斜体、代码块、无序列表）*/
function markdownToHtml(md) {
  if (!md) return '';
  return md
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/```([\s\S]*?)```/g, '<pre style="background:var(--surface-2);padding:10px;border-radius:6px;overflow-x:auto;font-size:.82rem;margin:6px 0"><code>$1</code></pre>')
    .replace(/`([^`]+)`/g, '<code style="background:var(--surface-2);padding:1px 5px;border-radius:3px">$1</code>')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/^### (.+)$/gm, '<h4 style="margin:10px 0 4px">$1</h4>')
    .replace(/^## (.+)$/gm,  '<h3 style="margin:12px 0 6px">$1</h3>')
    .replace(/^# (.+)$/gm,   '<h2 style="margin:14px 0 8px">$1</h2>')
    .replace(/^- (.+)$/gm,   '<li style="margin-left:16px">$1</li>')
    .replace(/\n/g, '<br>');
}

function showToast(msg, type = 'info', duration = 3500) {
  const wrap = document.getElementById('toastWrap');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  wrap.appendChild(t);
  setTimeout(() => t.remove(), duration);
}

// ── 初始化 ────────────────────────────────────────────────────────────────
loadDocuments();
setInterval(loadDocuments, 30000);  // 每 30 秒刷新文档列表
</script>
</body>
</html>
