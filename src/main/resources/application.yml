server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: knowledge-base
  datasource:
    url: jdbc:postgresql://localhost:5432/knowledge_base
    username: kb_user
    password: kb_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  sql:
    init:
      mode: never   # schema.sql 由 docker-compose 初始化

  # Redis 配置（Token 缓存 + 分布式锁）
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: 1000ms

  # Spring AI 配置
  ai:
    # OpenAI 配置（替换为实际 API Key）
    openai:
      api-key: ${OPENAI_API_KEY:sk-your-api-key-here}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.3
          max-tokens: 2048
      embedding:
        options:
          model: text-embedding-3-small

    # PGVector 向量存储配置
    # 注意：VectorStoreConfig 中手动声明了双 VectorStore Bean（docVectorStore + sopVectorStore）
    # auto-configure 被禁用，仅保留 dimensions 参数供 VectorStoreConfig 读取
    vectorstore:
      pgvector:
        enabled: false            # 禁用 auto-configure（使用 VectorStoreConfig 手动配置）
        dimensions: 1536          # text-embedding-3-small 维度（供 VectorStoreConfig 注入）

# 文档处理配置
kb:
  document:
    upload-dir: ${KB_UPLOAD_DIR:./uploads}
    max-file-size: 50MB
    allowed-types: pdf,docx,doc,txt,md
    chunk-size: 800          # token per chunk
    chunk-overlap: 200       # overlap token
  
  # URL 录入配置（UrlFetcher）
  ingest:
    url:
      user-agent: "Mozilla/5.0 (compatible; KnowledgeBase-Bot/1.0; +https://github.com/kb)"
      max-content-bytes: 5242880   # 5 MB，超出截断
      # 单次抓取超时由请求参数 timeoutSeconds 控制（默认 15s）
  
  rag:
    top-k: 5                 # 检索 Top-K 片段
    similarity-threshold: 0.65  # 最低相似度阈值
    use-hybrid-search: true   # 启用 Hybrid Search（向量 + BM25）
  
  # Hybrid Search 混合检索配置
  hybrid:
    enabled: true            # 是否启用混合检索
    vector-weight: 0.5        # 向量检索权重（0.0-1.0）
    keyword-weight: 0.5       # BM25 关键词检索权重（0.0-1.0）
    rrf-k: 60                # RRF 算法参数（通常 60）
    vector-top-k: 20         # 向量检索候选数量
    keyword-top-k: 20         # BM25 检索候选数量
  
  # 向量缓存配置
  cache:
    max-size: 500            # 最大缓存问题数量（向量占用内存较大）
    similarity-threshold: 0.95  # 相似度阈值（> 0.95 视为相同问题）
    ttl-minutes: 30          # 缓存过期时间（分钟）
  
  # 异步线程池配置
  async:
    core-pool-size: 4        # 核心线程数（建议 CPU 核心数）
    max-pool-size: 16        # 最大线程数（I/O 密集型任务）
    queue-capacity: 100      # 队列容量
    keep-alive-seconds: 60   # 线程空闲时间
  
  chat:
    system-prompt: |
      你是一个专业的企业知识库助手。请严格基于以下检索到的上下文信息来回答用户问题。
      如果上下文中没有相关信息，请明确告知用户"根据现有知识库，暂无相关信息"，不要凭空捏造答案。
      回答时请保持准确、简洁、专业，并在合适时引用来源文档名称。

      上下文信息：
      {context}

# ================================================================
# BERT 意图识别配置
# ================================================================
bert:
  # 是否启用 BERT 主路径（false=纯 LLM 降级，本地开发推荐 false）
  enabled: ${BERT_ENABLED:false}
  service:
    url: ${BERT_SERVICE_URL:http://localhost:8000}
  # BERT 置信度阈值（低于此值触发 LLM 降级）
  confidence-threshold: 0.82

# 意图识别策略配置
intent:
  # LLM 分类置信度最低阈值（低于此值使用默认 QUERY 策略）
  fallback-threshold: 0.65
  llm:
    max-tokens: 150

# ================================================================
# 营销 API 配置（MCP 工具调用的目标服务）
# ================================================================
marketing:
  api:
    base-url: ${MARKETING_API_BASE_URL:http://localhost:9090}
    # 注：token 已移除，改为由 TokenRefreshService 从中台动态获取
  token:
    # 中台 OAuth 服务地址（提供 /oauth/token 接口）
    middle-platform-url: ${MIDDLE_PLATFORM_URL:http://localhost:8888}
    app-id: ${MIDDLE_PLATFORM_APP_ID:your-app-id}
    app-secret: ${MIDDLE_PLATFORM_APP_SECRET:your-app-secret}
    # Redis 缓存 Key
    redis-key: "marketing:token"
    # 分布式锁 Key
    lock-key: "marketing:token:lock"
    # 等锁超时（秒）：等待其他实例释放锁的最长时间
    lock-wait-seconds: 5
    # 锁自动释放时间（秒）：防止宕机导致锁泄漏
    lock-lease-seconds: 10
    # 提前刷新窗口（秒）：Token 剩余有效期 < 此值时主动刷新
    refresh-ahead-seconds: 300
    # 获锁失败后最大自旋重试次数
    max-retry: 3

# ================================================================
# Agent 链配置
# ================================================================
agent:
  planner:
    max-steps: 10           # Planner 最多拆分步骤数
  supervisor:
    max-replan-count: 2     # Supervisor 触发重规划的最大次数

logging:
  level:
    com.kb: DEBUG
    org.springframework.ai: INFO
